name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    # Minimal permissions: only contents:read for actions/checkout. The cache
    # half of subosito/flutter-action and actions/upload-artifact both rely on
    # ACTIONS_RUNTIME_TOKEN (runner-scoped, not GITHUB_TOKEN) so they need no
    # actions:* scope on the GITHUB_TOKEN — confirmed in their respective
    # action docs.
    permissions:
      contents: read
    # Every action in this job is SHA-pinned. The release AAB this job produces
    # is what attest-release signs a provenance statement for — if any of these
    # actions could be retargeted (`@v4` resolving to a malicious commit), the
    # AAB itself could be tampered with before signing, and the attestation
    # would faithfully prove the wrong artifact's authenticity. The pin is
    # what makes the whole supply-chain claim meaningful.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ runner.temp }}/walkie-talkie.jks
          echo "Keystore decoded to ${{ runner.temp }}/walkie-talkie.jks"

      - name: Build release AAB
        # android/app/build.gradle.kts derives versionCode from the runner's
        # default GITHUB_RUN_NUMBER + GITHUB_RUN_ATTEMPT env vars (auto-set on
        # every step) so each CI run and each rerun gets a unique code — Play
        # rejects duplicates.
        #
        # SENTRY_DSN is optional: when the secret is present the DSN is baked
        # into the binary via --dart-define so crash reporting is available to
        # users who opt in. When absent the define is empty and the crash-
        # reporting toggle in Settings is rendered disabled (compile-time gate
        # in lib/services/sentry_config.dart).
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/walkie-talkie.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Error: One or more signing secrets are not set"
            echo "Required: KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
            exit 1
          fi
          SENTRY_DEFINE=""
          if [ -n "$SENTRY_DSN" ]; then
            echo "::notice title=Sentry::SENTRY_DSN secret present — crash reporting enabled in this build."
            SENTRY_DEFINE="--dart-define=SENTRY_DSN=$SENTRY_DSN"
          else
            echo "::notice title=Sentry::SENTRY_DSN secret not set — crash reporting toggle will be disabled in this build."
          fi
          flutter build appbundle --release --target-platform=android-arm64,android-arm,android-x64 $SENTRY_DEFINE

      - name: Assert vcsInfo metadata is present in AAB
        # Guards against silent regressions of bundle.vcsInfo.include in
        # build.gradle.kts (e.g. an autofix tool comments the block out as
        # collateral during an unrelated cleanup, as happened in 1a763a1).
        # Without this, only Play Console would notice — by which point a
        # release is already shipped without source-linked crash traces.
        # AGP serializes vcsInfo as a protobuf under BUNDLE-METADATA/; matching
        # the prefix rather than the exact filename keeps the check stable
        # across AGP versions that may rename the inner path.
        run: |
          AAB_PATH=build/app/outputs/bundle/release/app-release.aab
          if [ ! -f "$AAB_PATH" ]; then
            echo "Error: $AAB_PATH not found"
            exit 1
          fi
          if ! unzip -l "$AAB_PATH" | grep -qiE 'BUNDLE-METADATA/[^[:space:]]*vcs'; then
            echo "Error: AAB is missing vcsInfo metadata under BUNDLE-METADATA/."
            echo "       bundle.vcsInfo.include in android/app/build.gradle.kts"
            echo "       must be true so Play Console can deep-link crashes to commits."
            echo "       BUNDLE-METADATA contents in the built AAB:"
            unzip -l "$AAB_PATH" | grep -E 'BUNDLE-METADATA/' || echo "       (none)"
            exit 1
          fi
          echo "::notice title=vcsInfo::Found vcsInfo metadata in AAB"

      - name: Measure AAB size
        # Bundle-on-disk size is a coarse catastrophic-regression alarm — a 50
        # MiB ceiling well above the per-device target catches an accidental
        # fat APK config or a vendored binary blob without flapping on small
        # growth. The number that actually matters for #131's per-device
        # download target (~30 MiB; the issue says "30 MB" which we round to
        # the nearest MiB since CI math is in MiB throughout) is what Play
        # serves to a device, measured by the bundletool step below.
        env:
          AAB_MAX_BYTES: 52428800 # 50 MiB
        run: |
          AAB_PATH=build/app/outputs/bundle/release/app-release.aab
          if [ ! -f "$AAB_PATH" ]; then
            echo "Error: $AAB_PATH not found"
            exit 1
          fi
          AAB_BYTES=$(stat -c%s "$AAB_PATH")
          AAB_MIB=$(awk "BEGIN { printf \"%.2f\", $AAB_BYTES / 1048576 }")
          echo "AAB size: ${AAB_BYTES} bytes (${AAB_MIB} MiB)"
          echo "::notice title=AAB size::${AAB_MIB} MiB (${AAB_BYTES} bytes)"
          if [ -n "$GITHUB_STEP_SUMMARY" ]; then
            {
              echo "### AAB size"
              echo ""
              echo "- **${AAB_MIB} MiB** (${AAB_BYTES} bytes)"
              echo "- Budget: $((AAB_MAX_BYTES / 1048576)) MiB"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$AAB_BYTES" -gt "$AAB_MAX_BYTES" ]; then
            echo "Error: AAB size ${AAB_BYTES} bytes exceeds budget ${AAB_MAX_BYTES} bytes"
            exit 1
          fi

      - name: Measure per-device download size (bundletool)
        # Replays Play's split logic on the signed AAB to derive what a real
        # device would download — the number issue #131 budgets ("target < 30
        # MB AAB download", which we treat as 30 MiB throughout for unit
        # consistency). Soft-warns on > 30 MiB target; hard-fails on > 50 MiB
        # ceiling. See scripts/measure_app_size.sh for the bundletool
        # invocation and SHA-pinning rationale.
        env:
          AAB_PATH: build/app/outputs/bundle/release/app-release.aab
          KEYSTORE_PATH: ${{ runner.temp }}/walkie-talkie.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          WORK_DIR: ${{ runner.temp }}/bundletool
          # Pin policy here so the release budget is visible at the call site
          # and can't drift if measure_app_size.sh's defaults change.
          DOWNLOAD_TARGET_MIB: 30
          DOWNLOAD_CEILING_MIB: 50
        run: bash scripts/measure_app_size.sh

      - name: Upload release AAB
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ runner.temp }}/walkie-talkie.jks

  attest-release:
    # Isolated job so id-token:write + attestations:write don't bleed onto the
    # build steps that touch the keystore, run third-party Dart/Gradle code, or
    # could otherwise be coerced into minting a provenance statement under our
    # OIDC identity. The attestation is bound to the AAB's SHA-256 digest, so
    # generating it after a re-download from the workflow artifact store is
    # equivalent to generating it in-place — same bytes, same subject.
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download release AAB
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-aab
          path: aab

      - name: Generate SLSA build provenance
        # Emits a SLSA Provenance v1 statement bound to the AAB's SHA-256 digest,
        # signed with this workflow's OIDC identity via Sigstore's public-good
        # infrastructure (GitHub-hosted runners + reusable workflow detection
        # qualify this for SLSA Build Level 3 per the action docs). Verifiable
        # post-download with:
        #   gh attestation verify <aab> --repo ElodinLaarz/walkie-talkie
        # which lets a downloader confirm the AAB was produced by THIS workflow
        # at this commit, before sideloading or shipping it through Play.
        #
        # Pinned to a full commit SHA — every action in this workflow is, on
        # purpose: build-release produces the AAB this step signs, so a tag
        # retarget on any of them would let an attacker tamper with the AAB
        # while we still emit a "valid" provenance statement for it. The pin
        # is what makes the supply-chain claim meaningful end-to-end.
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: aab/app-release.aab
