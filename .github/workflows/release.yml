name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    # SLSA provenance signing (#131): id-token for the OIDC token used to sign
    # the attestation via Sigstore, attestations for storing the SLSA Provenance
    # v1 statement against the repo. contents:read is the default we'd otherwise
    # inherit but is spelled out here so the full permission surface is visible
    # in one place.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ runner.temp }}/walkie-talkie.jks
          echo "Keystore decoded to ${{ runner.temp }}/walkie-talkie.jks"

      - name: Build release AAB
        # android/app/build.gradle.kts derives versionCode from the runner's
        # default GITHUB_RUN_NUMBER + GITHUB_RUN_ATTEMPT env vars (auto-set on
        # every step) so each CI run and each rerun gets a unique code — Play
        # rejects duplicates.
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/walkie-talkie.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Error: One or more signing secrets are not set"
            echo "Required: KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
            exit 1
          fi
          flutter build appbundle --release --target-platform=android-arm64,android-arm,android-x64

      - name: Measure AAB size
        # Logs the AAB size and fails if it exceeds the budget. The 30 MB target
        # in #131 is the goal; we set the hard ceiling well above that so this
        # step catches catastrophic regressions (e.g. an accidental fat APK
        # config or a vendored binary blob) without flapping on small growth.
        # Note: this measures the AAB itself, not the per-device download —
        # bundletool's Play-served APK split sizes are typically much smaller.
        env:
          AAB_MAX_BYTES: 52428800 # 50 MiB
        run: |
          AAB_PATH=build/app/outputs/bundle/release/app-release.aab
          if [ ! -f "$AAB_PATH" ]; then
            echo "Error: $AAB_PATH not found"
            exit 1
          fi
          AAB_BYTES=$(stat -c%s "$AAB_PATH")
          AAB_MIB=$(awk "BEGIN { printf \"%.2f\", $AAB_BYTES / 1048576 }")
          echo "AAB size: ${AAB_BYTES} bytes (${AAB_MIB} MiB)"
          echo "::notice title=AAB size::${AAB_MIB} MiB (${AAB_BYTES} bytes)"
          if [ -n "$GITHUB_STEP_SUMMARY" ]; then
            {
              echo "### AAB size"
              echo ""
              echo "- **${AAB_MIB} MiB** (${AAB_BYTES} bytes)"
              echo "- Budget: $((AAB_MAX_BYTES / 1048576)) MiB"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$AAB_BYTES" -gt "$AAB_MAX_BYTES" ]; then
            echo "Error: AAB size ${AAB_BYTES} bytes exceeds budget ${AAB_MAX_BYTES} bytes"
            exit 1
          fi

      - name: Generate SLSA build provenance
        # Emits a SLSA Provenance v1 statement bound to the AAB's SHA-256 digest,
        # signed with this workflow's OIDC identity via Sigstore's public-good
        # infrastructure (GitHub-hosted runners + reusable workflow detection
        # qualify this for SLSA Build Level 3 per the action docs). The
        # attestation is stored on the repo and is verifiable with:
        #   gh attestation verify <aab> --repo ElodinLaarz/walkie-talkie
        # which lets a downloader confirm the AAB was produced by THIS workflow
        # at this commit, before sideloading or shipping it through Play.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ runner.temp }}/walkie-talkie.jks
