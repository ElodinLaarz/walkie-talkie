name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build & run native mixer test
        run: |
          if [ ! -f test/cpp/mixer_test.cpp ]; then
            echo "test/cpp/mixer_test.cpp missing — failing fast"; exit 1
          fi
          mkdir -p build/cpp_test
          ${CXX:-g++} -std=c++17 -Wall -Wextra -pthread test/cpp/mixer_test.cpp -o build/cpp_test/mixer_test
          build/cpp_test/mixer_test
