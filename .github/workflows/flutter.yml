name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # opus is a git submodule at android/app/src/main/cpp/opus (see
          # .gitmodules). Without this the Gradle CMake step in
          # `Measure AAB size` fails with "does not contain a CMakeLists.txt
          # file" on the opus path. oboe is vendored directly (not a
          # submodule) so checkout already includes it.
          submodules: recursive

      # Run before flutter-action so a metadata character-limit violation
      # fails fast without paying the cost of downloading and caching the
      # Flutter SDK. The script only needs the checked-out files and python3.
      - name: Validate Play Store metadata character limits
        run: bash scripts/validate_store_metadata.sh

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version

      - name: Install native dependencies
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y -q libopus-dev pkg-config

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build & run native C++ tests
        run: bash scripts/run_native_cpp_tests.sh

      - name: Run Kotlin unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      # Debug AAB regression alarm (issue #131): build a debug AAB and fail
      # fast on catastrophic on-disk bloat (e.g., accidentally vendored binary
      # blob, fat-APK misconfig). Uses the debug keystore so no signing
      # credentials are needed on PR builds from forks.
      #
      # NOT the per-device Play download number. A debug AAB intrinsically
      # carries ~80 MiB of kernel_blob.bin + debug libflutter.so + Vulkan
      # validation layer that a release AAB does not. The 30 MiB target from
      # #131 is the per-device download served by Play after ABI/density/lang
      # split — that number is measured by release.yml via bundletool against
      # a signed release AAB. Holding a debug bundle to 30 MiB was a category
      # error (every PR fails); this step keeps the cheap on-disk regression
      # catch with a budget proportionate to debug-mode reality.
      - name: Measure AAB size (debug, ≤ 100 MiB regression alarm)
        continue-on-error: false
        run: |
          set -euo pipefail
          sudo apt-get install -y -q openjdk-17-jdk-headless
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

          flutter build appbundle --debug

          AAB="build/app/outputs/bundle/debug/app-debug.aab"
          if [ ! -f "$AAB" ]; then
            echo "::error::AAB not found at $AAB — Gradle output path may have changed. Update this step rather than letting the regression alarm silently no-op."
            exit 1
          fi

          SIZE_BYTES=$(stat -c%s "$AAB")
          SIZE_MIB=$(awk "BEGIN { printf \"%.2f\", $SIZE_BYTES / 1048576 }")
          echo "Debug AAB size: ${SIZE_MIB} MiB  (${SIZE_BYTES} bytes)"

          LIMIT_BYTES=$((100 * 1048576))
          if [ "$SIZE_BYTES" -gt "$LIMIT_BYTES" ]; then
            echo "::error::Debug AAB exceeds 100 MiB regression alarm (${SIZE_MIB} MiB). This is the on-disk debug bundle, not the Play download — see release.yml for the per-device number measured by bundletool."
            exit 1
          fi
          echo "::notice::Debug AAB ${SIZE_MIB} MiB is within the 100 MiB regression alarm."

      # Build a sideloadable APK and publish it as a workflow artifact so a
      # change on a PR can be installed on a real device for on-device
      # validation without a local Flutter toolchain. PROFILE (not debug) on
      # purpose: it is AOT-compiled and behaves like release for timing-
      # sensitive paths (audio jitter / bitrate adaptation), which is exactly
      # what these builds are usually validated against — a debug APK's JIT VM
      # would misrepresent that. Profile uses the debug signing config, so no
      # signing secrets are needed and this works on fork PRs. NOT for Play
      # distribution — release.yml owns the signed release artifact.
      #
      # The native C++ build path is identical to the debug AAB step above, so
      # if that succeeds this does too. JAVA_HOME is set here (step-scoped, like
      # the AAB step) because AGP requires JDK 17.
      - name: Build profile APK (sideload artifact)
        run: |
          set -euo pipefail
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          flutter build apk --profile

      - name: Upload profile APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: walkie-talkie-profile-apk
          path: build/app/outputs/flutter-apk/app-profile.apk
          retention-days: 14
