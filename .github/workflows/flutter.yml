name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version

      - name: Install native dependencies
        run: sudo apt-get install -y libopus-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build & run native C++ tests
        run: |
          mkdir -p build/cpp_test
          for required in \
              test/cpp/mixer_test.cpp \
              test/cpp/jitter_buffer_test.cpp \
              test/cpp/resampler_test.cpp \
              test/cpp/talking_event_queue_test.cpp \
              test/cpp/ring_buffer_test.cpp \
              test/cpp/opus_codec_test.cpp \
              android/app/src/main/cpp/audio_mixer.cpp \
              android/app/src/main/cpp/talking_event_queue.h \
              android/app/src/main/cpp/ring_buffer.h \
              android/app/src/main/cpp/opus_codec.h \
              android/app/src/main/cpp/opus_codec.cpp; do
            if [ ! -f "$required" ]; then
              echo "$required missing — failing fast"; exit 1
            fi
          done

          # mixer_test links the production audio_mixer.cpp via the host
          # shims under test/cpp/ (introduced by #96 to retire the fork).
          ${CXX:-g++} -std=c++17 -Wall -Wextra -pthread \
              -I test/cpp \
              -I android/app/src/main/cpp \
              test/cpp/mixer_test.cpp \
              android/app/src/main/cpp/audio_mixer.cpp \
              -o build/cpp_test/mixer_test
          build/cpp_test/mixer_test

          # jitter_buffer_test exercises the production jitter_buffer.cpp.
          ${CXX:-g++} -std=c++17 -Wall -Wextra -pthread \
              -I test/cpp \
              -I android/app/src/main/cpp \
              test/cpp/jitter_buffer_test.cpp \
              android/app/src/main/cpp/jitter_buffer.cpp \
              -o build/cpp_test/jitter_buffer_test
          build/cpp_test/jitter_buffer_test

          # resampler_test exercises header-only resampler.h.
          ${CXX:-g++} -std=c++17 -Wall -Wextra -pthread \
              -I test/cpp \
              -I android/app/src/main/cpp \
              test/cpp/resampler_test.cpp \
              -o build/cpp_test/resampler_test
          build/cpp_test/resampler_test

          # talking_event_queue_test exercises header-only talking_event_queue.h
          # — the SPSC ring that moves JNI dispatch off the audio thread (#99).
          ${CXX:-g++} -std=c++17 -Wall -Wextra -pthread \
              -I test/cpp \
              -I android/app/src/main/cpp \
              test/cpp/talking_event_queue_test.cpp \
              -o build/cpp_test/talking_event_queue_test
          build/cpp_test/talking_event_queue_test

          # ring_buffer_test exercises header-only ring_buffer.h (#128).
          ${CXX:-g++} -std=c++17 -Wall -Wextra -pthread \
              -I test/cpp \
              -I android/app/src/main/cpp \
              test/cpp/ring_buffer_test.cpp \
              -o build/cpp_test/ring_buffer_test
          build/cpp_test/ring_buffer_test

          # opus_codec_test exercises OpusEncoder/OpusDecoder (#128).
          # libopus installed above via apt-get; pkg-config supplies include path.
          ${CXX:-g++} -std=c++17 -Wall -Wextra -pthread \
              -I test/cpp \
              -I android/app/src/main/cpp \
              $(pkg-config --cflags opus) \
              test/cpp/opus_codec_test.cpp \
              android/app/src/main/cpp/opus_codec.cpp \
              $(pkg-config --libs opus) \
              -o build/cpp_test/opus_codec_test
          build/cpp_test/opus_codec_test

      # App size budget (issue #131): build a debug AAB and enforce the
      # < 30 MB download-size target. Uses the debug keystore so no signing
      # credentials are needed. `continue-on-error` keeps the main test
      # suite unblocked while the full NDK/Gradle/Opus build path is being
      # validated; flip to `false` once the native build is stable in CI.
      - name: Measure AAB size (< 30 MB budget)
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo apt-get install -y -q openjdk-17-jdk-headless
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

          flutter build appbundle --debug

          AAB="build/app/outputs/bundle/debug/app-debug.aab"
          if [ ! -f "$AAB" ]; then
            echo "AAB not found at $AAB — skipping size check"; exit 0
          fi

          SIZE_BYTES=$(stat -c%s "$AAB")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "AAB size: ${SIZE_MB} MB  (${SIZE_BYTES} bytes)"

          LIMIT_BYTES=$((30 * 1048576))
          if [ "$SIZE_BYTES" -gt "$LIMIT_BYTES" ]; then
            echo "::error::AAB exceeds 30 MB budget (${SIZE_MB} MB). Reduce dependencies or assets."
            exit 1
          fi
          echo "::notice::AAB size ${SIZE_MB} MB is within the 30 MB budget."
